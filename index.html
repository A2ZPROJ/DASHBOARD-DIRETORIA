<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Diretoria — 2S Engenharia / A2Z Projetos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ── THEMES ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b22;--sf2:#1c2128;--sf3:#21262d;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);
  --tx:#e6edf3;--mu:#7d8590;--sh:rgba(0,0,0,.45);
  --sel-bg:#1c2128;
  --tbl-hv:rgba(255,255,255,.025);--tbl-hl:rgba(31,111,235,.10);
  --green:#2ea043;--gbg:#0f2d1a;--gtx:#56d364;
  --amber:#d29922;--abg:#2b1d04;--atx:#e3b341;
  --blue:#1f6feb;--bbg:#0c1f3d;--btx:#79c0ff;
  --gray:#30363d;--grx:#8b949e;
  --red:#da3633;--rbg:#300c0c;--rtx:#ff7b72;
  --cg:rgba(255,255,255,.06);--ct:#7d8590;
}
[data-theme="light"]{
  --bg:#f6f8fa;--surface:#fff;--sf2:#f0f2f5;--sf3:#e8eaed;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.16);
  --tx:#1c2128;--mu:#57606a;--sh:rgba(0,0,0,.12);
  --sel-bg:#fff;
  --tbl-hv:rgba(0,0,0,.02);--tbl-hl:rgba(31,111,235,.07);
  --green:#1a7f37;--gbg:#dafbe1;--gtx:#1a7f37;
  --amber:#9a6700;--abg:#fff8c5;--atx:#9a6700;
  --blue:#0969da;--bbg:#ddf4ff;--btx:#0969da;
  --gray:#6e7781;--grx:#6e7781;
  --red:#cf222e;--rbg:#ffebe9;--rtx:#cf222e;
  --cg:rgba(0,0,0,.07);--ct:#57606a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;transition:background .22s,color .22s;}

/* ── HEADER ── */
.hd{background:var(--surface);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;gap:10px;flex-wrap:wrap;transition:background .22s;}
.hl{display:flex;align-items:center;gap:10px;}
.logo{width:30px;height:30px;background:#1f6feb;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;}
.ht{font-size:14px;font-weight:600;}
.hs{font-size:11px;color:var(--mu);}
.hr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.upd-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ui{font-size:11px;color:var(--mu);}
.cd{font-size:11px;color:var(--mu);}
.cd span{color:var(--btx);font-weight:600;}

.ibtn{background:var(--sf2);border:1px solid var(--bd2);color:var(--mu);width:32px;height:32px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.ibtn:hover{background:var(--sf3);color:var(--tx);}
.ibtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bfile{background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:0 12px;border-radius:7px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap;height:32px;transition:background .15s;}
.bfile:hover{background:var(--sf3);}
.bfile input{display:none;}

/* ── FILTER BAR ── */
.fb{background:var(--sf2);border-bottom:1px solid var(--bd);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;transition:background .22s;}
.fl{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.fs{background:var(--sel-bg);border:1px solid var(--bd2);color:var(--tx);padding:5px 10px;border-radius:6px;font-size:12px;min-width:215px;cursor:pointer;outline:none;transition:background .22s,color .22s;}
.fs:focus{border-color:var(--blue);}
.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{background:transparent;border:1px solid var(--bd);color:var(--mu);padding:3px 10px;border-radius:10px;font-size:11px;cursor:pointer;transition:all .15s;}
.chip.on{border-color:var(--blue);background:var(--bbg);color:var(--btx);}
.chip:hover:not(.on){border-color:var(--bd2);color:var(--tx);}
.clr{background:transparent;border:none;color:var(--mu);font-size:11px;cursor:pointer;padding:3px 8px;border-radius:5px;}
.clr:hover{color:var(--rtx);}

/* ── AUTO-PATH NOTE ── */


/* ── MAIN ── */
.main{padding:14px 20px;max-width:1700px;margin:0 auto;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:13px;}
.kpi{background:var(--surface);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;transition:background .22s,border-color .22s;}
.kl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.kv{font-size:22px;font-weight:600;line-height:1;}
.ks{font-size:10px;color:var(--mu);margin-top:4px;}
.kb{height:3px;border-radius:2px;background:var(--bd);margin-top:7px;}
.kf{height:100%;border-radius:2px;transition:width .7s;}

.g2{display:grid;grid-template-columns:1fr 440px;gap:13px;margin-bottom:13px;}
.col{display:flex;flex-direction:column;gap:13px;}
.card{background:var(--surface);border:1px solid var(--bd);border-radius:8px;padding:13px 15px;transition:background .22s,border-color .22s;}
.ct{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu);}
.lsq{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cw{position:relative;}

/* ── MAP PANEL ── */
.mp{background:var(--surface);border:1px solid var(--bd);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;min-height:430px;transition:background .22s,border-color .22s;}
.mhd{padding:12px 14px 0;flex-shrink:0;}
.mt{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.mleg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
.mli{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu);}
.mdt{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.trow-btns{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.tbtn{background:var(--sf2);border:1px solid var(--bd);color:var(--mu);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn.on{background:var(--bbg);border-color:var(--blue);color:var(--btx);}
.tbtn:hover:not(.on){border-color:var(--bd2);color:var(--tx);}

#mapc{flex:1;position:relative;min-height:300px;}
#lmap{position:absolute;inset:0;}

/* leaflet overrides — keep zoom/pan controls working */
.leaflet-control-attribution{font-size:9px!important;opacity:.55;}
.leaflet-container{font-family:inherit!important;}
.leaflet-control-zoom{margin:8px!important;}
.leaflet-control-zoom a{width:26px!important;height:26px!important;line-height:26px!important;font-size:14px!important;}

.mtt{position:absolute;background:var(--surface);border:1px solid var(--bd2);border-radius:7px;padding:9px 11px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:1000;min-width:165px;box-shadow:0 4px 14px var(--sh);}
.mtt strong{font-size:12px;display:block;margin-bottom:3px;color:var(--tx);}
.tr{display:flex;justify-content:space-between;gap:10px;margin-top:2px;}
.tk{color:var(--mu);}
.mc{position:absolute;bottom:10px;right:10px;z-index:500;}
.mrst{background:var(--surface);border:1px solid var(--bd2);color:var(--mu);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;box-shadow:0 2px 8px var(--sh);transition:all .15s;}
.mrst:hover{color:var(--tx);background:var(--sf2);}

/* ── TABLE ── */
.tc{background:var(--surface);border:1px solid var(--bd);border-radius:8px;overflow:hidden;transition:background .22s,border-color .22s;}
.tt{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;}
.ttl{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;}
.tcs{display:flex;gap:4px;}
.tcp{background:transparent;border:1px solid var(--bd);color:var(--mu);padding:3px 8px;border-radius:7px;cursor:pointer;font-size:11px;transition:all .15s;}
.tcp.on{background:var(--bbg);border-color:var(--blue);color:var(--btx);}
.tcp:hover:not(.on){background:var(--sf2);color:var(--tx);}
.tsc{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:8px 11px;text-align:left;font-size:10px;font-weight:600;color:var(--mu);border-bottom:1px solid var(--bd);white-space:nowrap;background:var(--sf2);text-transform:uppercase;letter-spacing:.04em;}
td{padding:8px 11px;font-size:11px;border-bottom:1px solid var(--bd);white-space:nowrap;transition:background .15s;}
tr:last-child td{border-bottom:none;}
tr.hl td{background:var(--tbl-hl)!important;}
tr:hover td{background:var(--tbl-hv);}
td.mn{font-weight:500;color:var(--tx);max-width:145px;overflow:hidden;text-overflow:ellipsis;}
td.sq{color:var(--mu);text-align:center;width:34px;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:500;}
.bg{background:var(--gbg);color:var(--gtx);}
.ba{background:var(--abg);color:var(--atx);}
.bx{background:var(--sf2);color:var(--grx);}
.br{background:var(--rbg);color:var(--rtx);}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.pc{display:flex;align-items:center;gap:5px;}
.pb{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden;min-width:42px;}
.pf{height:100%;border-radius:2px;}
.pp{font-size:10px;color:var(--mu);min-width:28px;text-align:right;}

.empty{text-align:center;padding:56px 20px;color:var(--mu);}
.empty h3{font-size:15px;font-weight:500;color:var(--tx);margin-bottom:6px;}
.empty p{font-size:12px;line-height:1.7;}

@media(max-width:1100px){.g2{grid-template-columns:1fr;}.mp{min-height:400px;}}
@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.main,.hd,.fb{padding:9px 12px;}}
</style>
</head>

async function loadFromSupabase(){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/dashboard_data?id=eq.1&select=data,updated_at`,{
      headers:{apikey:SUPA_KEY,Authorization:`Bearer ${SUPA_KEY}`},
      cache:'no-store'
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const rows=await r.json();
    if(!rows||!rows[0]||!rows[0].data){throw new Error('Sem dados');}
    const parsed=rows[0].data;
    const upd=rows[0].updated_at||parsed.updatedAt;
    ALL=parsed.municipalities||[];
    buildSel();
    document.getElementById('fbar').style.display='flex';
    if(firstLoad){renderAll();firstLoad=false;}
    else{const f=getFiltered();renderKPI(f);renderTable(f);if(geoLayer)styleLayer();}
    try{
      const d=new Date(upd);
      document.getElementById('lupd').textContent='Atualizado '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }catch(_){document.getElementById('lupd').textContent='Atualizado';}
  }catch(e){
    document.getElementById('lupd').textContent='Falha ao carregar: '+e.message;
    if(firstLoad){
      document.getElementById('app').innerHTML='<div class="empty"><h3>Falha ao carregar dados</h3><p>'+e.message+'</p></div>';
    }
  }
}

document.getElementById('msel').addEventListener('change',e=>{
  curMun=e.target.value;applyF();
  if(curMun)zoomToMun(curMun);else resetZoom();
});

/* primeiro load + refresh a cada 60s + countdown */
loadFromSupabase();
setInterval(loadFromSupabase,60000);
(function(){
  let s=60;
  const tick=()=>{s--;if(s<=0)s=60;const m=Math.floor(s/60),ss=s%60;
    const el=document.getElementById('cdt');if(el)el.textContent=m+':'+String(ss).padStart(2,'0');};
  cdInt=setInterval(tick,1000);tick();
})();

function buildSel(){
  const s=document.getElementById('msel');
  s.innerHTML='<option value="">Todos os municípios</option>';
  ALL.forEach(m=>{const o=document.createElement('option');o.value=m.mun;o.textContent=m.seq+'. '+m.mun;s.appendChild(o);});
}

function setStF(v,el){curSt=v;document.querySelectorAll('[data-chip]').forEach(c=>c.classList.remove('on'));el.classList.add('on');applyF();}
function clearF(){
  curMun='';curSt='all';
  document.getElementById('msel').value='';
  document.querySelectorAll('[data-chip]').forEach(c=>c.classList.remove('on'));
  document.querySelector('[data-chip="all"]').classList.add('on');
  applyF();resetZoom();
}

function getFiltered(){
  let l=ALL;
  if(curMun) l=l.filter(m=>m.mun===curMun);
  if(curSt!=='all') l=l.filter(m=>SVC.some(s=>{
    const st=m.svc[s.key].st;
    if(curSt==='finalizado') return st==='Finalizado';
    if(curSt==='execucao')   return st==='Em Execução';
    if(curSt==='aexecutar')  return st==='A Executar';
  }));
  return l;
}

function applyF(){const f=getFiltered();renderKPI(f);renderTable(f);if(geoLayer)styleLayer();}

function renderAll(){
  destroyCharts();
  document.getElementById('app').innerHTML=buildHTML();
  const f=getFiltered();
  renderKPI(f);buildCharts();renderTable(f);
  initMap();
}

/* ── KPI ── */
function renderKPI(list){
  const el=document.getElementById('kgrid');if(!el)return;
  const n=list.length;let fi=0,ex=0,ae=0,ce=0;
  SVC.forEach(s=>list.forEach(m=>{const st=m.svc[s.key].st;if(st==='Finalizado')fi++;else if(st==='Em Execução')ex++;else ae++;ce++;}));
  const pct=ce>0?Math.round(fi/ce*100):0;
  const tf=list.filter(m=>m.svc.topo.st==='Finalizado').length;
  const tp=n>0?Math.round(tf/n*100):0;
  const ep=ce>0?Math.round(ex/ce*100):0;
  el.innerHTML=`
  <div class="kpi"><div class="kl">Municípios</div><div class="kv" style="color:var(--btx)">${n}</div><div class="ks">no filtro</div></div>
  <div class="kpi"><div class="kl">Progresso Geral</div><div class="kv" style="color:var(--gtx)">${pct}%</div><div class="kb"><div class="kf" style="width:${pct}%;background:var(--green)"></div></div></div>
  <div class="kpi"><div class="kl">Finalizadas</div><div class="kv" style="color:var(--gtx)">${fi}</div><div class="ks">de ${ce} etapas</div></div>
  <div class="kpi"><div class="kl">Em Execução</div><div class="kv" style="color:var(--atx)">${ex}</div><div class="kb"><div class="kf" style="width:${ep}%;background:var(--amber)"></div></div></div>
  <div class="kpi"><div class="kl">A Executar</div><div class="kv" style="color:var(--grx)">${ae}</div><div class="ks">${ce>0?Math.round(ae/ce*100):0}% das etapas</div></div>
  <div class="kpi"><div class="kl">Topografia</div><div class="kv" style="color:var(--btx)">${tp}%</div><div class="ks">${tf}/${n} concluídos</div><div class="kb"><div class="kf" style="width:${tp}%;background:var(--blue)"></div></div></div>`;
}

/* ── CHARTS ── */
function CC(){return dark
  ?{g:'#22c55e',a:'#f59e0b',gr:'#475569',gc:'rgba(255,255,255,.06)',tc:'#7d8590'}
  :{g:'#16a34a',a:'#d97706',gr:'#94a3b8',gc:'rgba(0,0,0,.07)',tc:'#57606a'};}

function buildCharts(){
  const C=CC();
  const fin =SVC.map(s=>ALL.filter(m=>m.svc[s.key].st==='Finalizado').length);
  const exec=SVC.map(s=>ALL.filter(m=>m.svc[s.key].st==='Em Execução').length);
  const aex =SVC.map(s=>ALL.filter(m=>m.svc[s.key].st==='A Executar').length);
  const pcts=SVC.map((s,i)=>ALL.length>0?Math.round(fin[i]/ALL.length*100):0);
  const labs=SVC.map(s=>s.sh);

  /* ── GROUPED BAR (side by side) ── */
  const c1=document.getElementById('cst');
  if(c1) charts.s=new Chart(c1,{
    type:'bar',
    data:{labels:labs,datasets:[
      {label:'Finalizado',  data:fin,  backgroundColor:C.g,  borderRadius:3,borderSkipped:false},
      {label:'Em Execução', data:exec, backgroundColor:C.a,  borderRadius:3,borderSkipped:false},
      {label:'A Executar',  data:aex,  backgroundColor:C.gr, borderRadius:3,borderSkipped:false},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
      scales:{
        x:{
          /* grouped — no stacking */
          ticks:{color:C.tc,font:{size:10},maxRotation:0},
          grid:{color:C.gc},
        },
        y:{
          ticks:{color:C.tc,font:{size:10},stepSize:5},
          grid:{color:C.gc},
        }
      }
    }
  });

  /* ── HORIZONTAL PROGRESS BAR ── */
  const c2=document.getElementById('cpg');
  if(c2) charts.p=new Chart(c2,{
    type:'bar',
    data:{labels:labs,datasets:[{
      label:'% Concluído',data:pcts,
      backgroundColor:pcts.map(v=>v>=80?C.g:v>=40?'#3b82f6':C.a),
      borderRadius:4,borderSkipped:false
    }]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.x+'%'}}},
      scales:{
        x:{min:0,max:100,ticks:{color:C.tc,font:{size:10},callback:v=>v+'%'},grid:{color:C.gc}},
        y:{ticks:{color:C.tc,font:{size:10}},grid:{display:false}}
      }
    }
  });
}

/* ── TABLE ── */
function setTF(v,el){tblF=v;document.querySelectorAll('[data-tc]').forEach(c=>c.classList.remove('on'));el.classList.add('on');renderTable(getFiltered());}

function renderTable(list){
  const tbl=document.getElementById('tbl');if(!tbl)return;
  let rows=list;
  if(tblF!=='all') rows=rows.filter(m=>SVC.some(s=>{
    const st=m.svc[s.key].st;
    if(tblF==='execucao') return st==='Em Execução';
    if(tblF==='aexecutar') return st==='A Executar';
  }));
  const cnt=document.getElementById('tblcnt');if(cnt)cnt.textContent=rows.length+' municípios';
  tbl.querySelector('thead').innerHTML=`<tr><th>#</th><th>Município</th>${SVC.map(s=>'<th>'+s.sh+'</th>').join('')}<th>Avanço Topografia</th><th>Avanço Proj. Redes</th></tr>`;
  const badge=st=>{
    if(st==='Finalizado') return`<span class="badge bg"><span class="dot" style="background:#56d364"></span>Finalizado</span>`;
    if(st==='Em Execução') return`<span class="badge ba"><span class="dot" style="background:#e3b341"></span>Em Execução</span>`;
    if(st==='Atrasado')   return`<span class="badge br"><span class="dot" style="background:#ff7b72"></span>Atrasado</span>`;
    return`<span class="badge bx"><span class="dot" style="background:#8b949e"></span>A Executar</span>`;
  };
  const prog=sv=>{
    if(sv.pct===null)return'—';
    const c=sv.pct>=100?'#22c55e':sv.pct>=50?'#3b82f6':'#f59e0b';
    return`<div class="pc"><div class="pb"><div class="pf" style="width:${sv.pct}%;background:${c}"></div></div><span class="pp">${sv.pct}%</span></div>`;
  };
  tbl.querySelector('tbody').innerHTML=rows.map(m=>
    `<tr class="${m.mun===curMun?'hl':''}">
      <td class="sq">${m.seq}</td><td class="mn" title="${m.mun}">${m.mun}</td>
      ${SVC.map(s=>'<td>'+badge(m.svc[s.key].st)+'</td>').join('')}
      <td>${prog(m.svc.topo)}</td><td>${prog(m.svc.projR)}</td>
    </tr>`
  ).join('')||`<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--mu)">Nenhum resultado</td></tr>`;
}

/* ── MAP ── */
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim();}
function findM(gn){return ALL.find(m=>norm(m.mun)===norm(gn))||null;}

function munColor(gn){
  const m=findM(gn);if(!m)return null;
  const fin=SVC.filter(s=>m.svc[s.key].st==='Finalizado').length;
  const exec=SVC.filter(s=>m.svc[s.key].st==='Em Execução').length;
  if(fin===SVC.length)return'#22c55e';
  if(fin>=SVC.length*.6)return'#4ade80';
  if(exec>0)return'#f59e0b';
  return'#64748b';
}

function featureStyle(feat){
  const gn=feat.properties.name;
  const isSelected=curMun&&norm(gn)===norm(curMun);
  const fc=munColor(gn);
  const inLote=!!fc;

  if(isSelected) return{
    fillColor:'#3b82f6',fillOpacity:.5,
    color:'#93c5fd',weight:1.5,opacity:1
  };
  if(inLote) return{
    fillColor:fc,fillOpacity:.35,
    color:dark?'rgba(255,255,255,.3)':'rgba(0,0,0,.25)',weight:.6,opacity:1
  };
  return{
    fillColor:'#64748b',fillOpacity:.08,
    color:dark?'rgba(255,255,255,.07)':'rgba(0,0,0,.12)',weight:.3,opacity:1
  };
}

function initMap(){
  const el=document.getElementById('lmap');if(!el)return;
  if(lmap){lmap.remove();lmap=null;geoLayer=null;}

  /* ── Leaflet map — scroll wheel zoom + drag enabled by default ── */
  lmap=L.map(el,{
    center:[-24.5,-51.5],zoom:6,
    scrollWheelZoom:true,   /* zoom with mouse wheel */
    dragging:true,          /* pan with left mouse button */
    zoomControl:true,
    attributionControl:true
  });

  const t=TILES[curTile];
  const opts={attribution:t.attr,maxZoom:18};
  if(t.sub) opts.subdomains=t.sub;
  tileL=L.tileLayer(t.url,opts).addTo(lmap);

  const GJURL='https://cdn.jsdelivr.net/gh/tbrugz/geodata-br@master/geojson/geojs-41-mun.json';
  const tt=document.getElementById('mtt');
  const cont=document.getElementById('mapc');

  fetch(GJURL)
    .then(r=>r.json())
    .then(data=>{
      geoData=data;
      geoLayer=L.geoJSON(data,{
        style:featureStyle,
        onEachFeature:(feat,layer)=>{
          const m=findM(feat.properties.name);
          if(!m)return;
          layer.on({
            mouseover(e){
              const ly=e.target;
              const isSelected=curMun&&norm(feat.properties.name)===norm(curMun);
              if(!isSelected){
                ly.setStyle({fillOpacity:.6,color:dark?'rgba(255,255,255,.65)':'rgba(0,0,0,.5)',weight:.9});
                ly.bringToFront();
              }
              const fn=SVC.filter(s=>m.svc[s.key].st==='Finalizado').length;
              const ex=SVC.filter(s=>m.svc[s.key].st==='Em Execução').length;
              tt.innerHTML=`<strong>${m.mun}</strong>
                <div class="tr"><span class="tk">Finalizadas</span><span style="color:#22c55e">${fn}/${SVC.length}</span></div>
                <div class="tr"><span class="tk">Em Execução</span><span style="color:#f59e0b">${ex}</span></div>
                <div class="tr"><span class="tk">Topografia</span><span>${m.svc.topo.st}</span></div>`;
              tt.style.opacity='1';
            },
            mousemove(e){
              const rc=cont.getBoundingClientRect();
              const W=rc.width;
              let x=e.originalEvent.clientX-rc.left+14;
              let y=e.originalEvent.clientY-rc.top-10;
              if(x+175>W)x-=190;
              tt.style.left=x+'px';tt.style.top=y+'px';
            },
            mouseout(e){
              geoLayer.resetStyle(e.target);
              styleLayer();   /* re-apply selected highlight */
              tt.style.opacity='0';
            },
            click(){
              curMun=m.mun;
              document.getElementById('msel').value=m.mun;
              applyF();
              zoomToMun(m.mun);
            }
          });
        }
      }).addTo(lmap);
      styleLayer();
    })
    .catch(()=>{
      if(cont) cont.insertAdjacentHTML('beforeend',
        '<div style="position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 14px;border-radius:6px;font-size:11px;z-index:700;white-space:nowrap">GeoJSON indisponível — verifique a conexão</div>');
    });
}

function styleLayer(){
  if(!geoLayer)return;
  geoLayer.setStyle(featureStyle);
  /* bring selected to front */
  geoLayer.eachLayer(ly=>{
    if(curMun&&norm(ly.feature.properties.name)===norm(curMun)) ly.bringToFront();
  });
}

function switchTile(key,el){
  curTile=key;
  document.querySelectorAll('[data-tile]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(lmap&&tileL){
    lmap.removeLayer(tileL);
    const t=TILES[key];
    const opts={attribution:t.attr,maxZoom:18};
    if(t.sub)opts.subdomains=t.sub;
    tileL=L.tileLayer(t.url,opts).addTo(lmap);
  }
}

function zoomToMun(munName){
  if(!geoData||!lmap)return;
  const feat=geoData.features.find(f=>norm(f.properties.name)===norm(munName));
  if(!feat)return;
  const lyr=L.geoJSON(feat);
  lmap.flyToBounds(lyr.getBounds(),{padding:[50,50],duration:.65,maxZoom:11});
  setTimeout(styleLayer,750);
}

function resetZoom(){
  if(!lmap)return;
  lmap.flyTo([-24.5,-51.5],6,{duration:.65});
  setTimeout(styleLayer,750);
}

function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}
</script>
